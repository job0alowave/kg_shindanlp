<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「何かしたい」の次が見つかる 4タイプ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#e8e6e1;line-height:1.9;-webkit-font-smoothing:antialiased}
.container{max-width:560px;margin:0 auto;padding:24px 20px 100px}
.progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#1d9e75,#5dcaa5);transition:width .4s ease;z-index:100}
.progress-text{text-align:center;font-size:12px;color:#5a5a5a;margin-bottom:20px;letter-spacing:.5px}
h1{font-size:24px;font-weight:700;text-align:center;margin:48px 0 12px;line-height:1.5;letter-spacing:-.5px}
.subtitle{text-align:center;color:#5a5a5a;font-size:13px;margin-bottom:48px;letter-spacing:1px}
.profile{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.profile img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #222}
.profile-name{font-size:12px;color:#5a5a5a;letter-spacing:.5px}
.intro-lead{font-size:15px;line-height:2;margin-bottom:32px;color:#b0ada6}
.intro-lead p{margin-bottom:14px}
.type-list{margin:28px 0 40px;border:1px solid #1a1a1a;border-radius:16px;overflow:hidden;background:#111}
.type-item{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #1a1a1a;font-size:13px;color:#b0ada6}
.type-item:last-child{border-bottom:none}
.type-badge{flex-shrink:0;background:#0f2e22;color:#1d9e75;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.time-note{text-align:center;color:#3a3a3a;font-size:12px;margin-bottom:24px;letter-spacing:.5px}
.start-btn{display:block;width:100%;background:#1d9e75;color:#fff;font-size:15px;font-weight:500;padding:18px;border:none;border-radius:14px;cursor:pointer;transition:all .3s;letter-spacing:.5px}
.start-btn:hover{background:#24b888;transform:translateY(-1px)}
.question-card{background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:28px 24px;margin-bottom:16px;display:none}
.question-card.active{display:block}
.q-number{font-size:11px;color:#1d9e75;font-weight:500;margin-bottom:12px;letter-spacing:1px}
.q-text{font-size:16px;font-weight:500;margin-bottom:24px;line-height:1.7;color:#e8e6e1}
.option{display:block;width:100%;text-align:left;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:16px 18px;margin-bottom:10px;font-size:13px;line-height:1.7;color:#b0ada6;cursor:pointer;transition:all .2s}
.option:hover{border-color:#1d9e75;background:#0f2e22;color:#e8e6e1}
.back-btn{display:inline-block;margin-top:12px;padding:10px 20px;font-size:12px;color:#5a5a5a;background:none;border:1px solid #222;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.back-btn:hover{color:#b0ada6;border-color:#444}
#result{display:none}
.result-card{background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:36px 28px;margin-bottom:28px}
.result-type{font-size:11px;color:#1d9e75;font-weight:500;margin-bottom:8px;letter-spacing:1px}
.result-title{font-size:20px;font-weight:700;margin-bottom:24px;line-height:1.5;letter-spacing:-.3px}
.result-body{font-size:14px;line-height:2;color:#b0ada6}
.result-body p{margin-bottom:18px}
.result-body strong{color:#e8e6e1;font-weight:500}
.result-steps{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:24px;margin:24px 0}
.result-steps p{font-weight:500;margin-bottom:14px;font-size:13px;color:#1d9e75;letter-spacing:.5px}
.result-steps li{margin-bottom:10px;font-size:13px;line-height:1.8;color:#b0ada6}
.result-note{font-size:13px;color:#5a5a5a;margin-top:16px}
.cta-box{background:linear-gradient(135deg,#0f3d2e,#1d9e75);border-radius:16px;padding:36px 28px;text-align:center;margin-top:36px}
.cta-profile{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
.cta-profile img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.2)}
.cta-profile span{color:rgba(255,255,255,.8);font-size:13px}
.cta-box p{color:#fff;font-size:15px;margin-bottom:20px;line-height:1.8;font-weight:300}
.cta-btn{display:inline-block;background:#fff;color:#0f3d2e;font-size:15px;font-weight:700;padding:16px 48px;border-radius:50px;text-decoration:none;transition:all .3s;letter-spacing:.5px}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,158,117,.3)}
.cta-note{text-align:center;color:#5a5a5a;font-size:12px;margin-top:20px;line-height:1.8}
.cta-note strong{color:#b0ada6;font-weight:500}
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="container">

<div id="intro">
<div class="profile"><img src="icon.jpeg" alt="けーじー"><span class="profile-name">けーじー｜「何かしたい」から始めた記録</span></div>
<h1>「何かしたい」の次が<br>見つかる</h1>
<p class="subtitle">10問でわかる 4タイプ診断</p>
<div class="intro-lead">
<p>「何かを始めたい。でも何から始めればいいか分からない。」</p>
<p>子育てしながら、自分も何かを変えたい。</p>
<p>動けない原因は、4タイプに分かれます。</p>
</div>
<div class="type-list">
<div class="type-item"><span class="type-badge">TYPE 1</span>何から始めればいいか分からない</div>
<div class="type-item"><span class="type-badge">TYPE 2</span>やりたいことはあるけど動けない</div>
<div class="type-item"><span class="type-badge">TYPE 3</span>動いてるけど成果が出ない</div>
<div class="type-item"><span class="type-badge">TYPE 4</span>成果は出てるけど消耗してる</div>
</div>
<p class="time-note">所要時間：約1分</p>
<button class="start-btn" onclick="startQuiz()">無料で診断する</button>
</div>

<div id="quiz" style="display:none">
<p class="progress-text" id="progressText"></p>
</div>

<div id="result"></div>

</div>

<script>
const questions = [
{q:"子どもが寝たあとの時間、何をしていますか？",a:"スマホをなんとなく見て終わる",b:"やりたいことはあるけど手が動かない",c:"作業はしてるけど成果が出ない",d:"作業してるけど毎晩疲れる"},
{q:"「何かを始めたい」と思ったことはありますか？",a:"思うけど、何を始めればいいか分からない",b:"やりたいことはあるけど、最初の一歩が出ない",c:"始めてるけど、うまくいってない",d:"やってるけど、続けるのがしんどい"},
{q:"自分の時間、1日にどのくらいありますか？",a:"ほぼゼロ。考える余裕もない",b:"夜に30分〜1時間あるけど、使い方が分からない",c:"時間は確保できてるけど、結果につながらない",d:"時間はあるけど、やることが多すぎて足りない"},
{q:"AIを使ったことはありますか？",a:"聞いたことはあるけど触ったことがない",b:"使ってみたけど、うまく使えなかった",c:"使えてるけど、それをお金にする方法が分からない",d:"使いこなしてるけど、毎回自分でやらないといけない"},
{q:"「自分にできることがある」と思えますか？",a:"正直、何もないと思ってる",b:"何かあるはずだけど、言葉にできない",c:"できることはあるけど、求められてる感じがしない",d:"できることは分かってるけど、時間が足りない"},
{q:"収入について、正直な気持ちは？",a:"もう1つ収入源がほしいけど、何をすれば…",b:"やりたいことはあるけど、お金になる気がしない",c:"少し動いてるけど、まだ1円にもなってない",d:"お金にはなってるけど、不安定で消耗してる"},
{q:"夫や家族に「やりたいこと」を話せていますか？",a:"まだ自分でも分かってないから話せない",b:"心の中にはあるけど、笑われそうで言えない",c:"話してるけど、「で、いくらになったの」と聞かれる",d:"理解してもらえてるけど、家事との両立がきつい"},
{q:"今の一番の壁は？",a:"何をすればいいか分からないこと",b:"分かってるのに動けないこと",c:"動いてるのに結果が出ないこと",d:"結果は出てるのに楽にならないこと"},
{q:"3ヶ月後、どうなっていたい？",a:"「これをやる」が決まっていたい",b:"毎週何かを作れる自分になりたい",c:"作ったものが誰かに届いていたい",d:"自分がいなくても回る仕組みがほしい"},
{q:"今、いちばん正直な気持ちは？",a:"何から始めればいいか教えてほしい",b:"とにかく最初の一歩を踏み出したい",c:"やってるのに報われない理由を知りたい",d:"もっとラクに続ける方法を知りたい"}
];

const results = {
a:{type:"TYPE 1",name:"何から始めれば…",keyword:"テーマ",title:"「何を始めればいいか分からない」あなたへ",body:`<p>これは「センスの問題」でも「あなたに何もない」わけでもありません。</p><p>動けない理由は、<strong>今の自分がどこにいるか見えていないから</strong>です。</p><p>「何を始めるか」を決める前に「自分は今どのステージか」が分かると、迷いが消えます。</p>`,steps:["「発信ステージ診断シート」で今の自分のステージを確認する","自分のステージで「次にやること1つ」を特定する","それだけやる。何を始めるかは、ステージが分かってから"],present:"発信ステージ診断シート",note:""},
b:{type:"TYPE 2",name:"動けない壁",keyword:"書けない",title:"「やりたいことはある。でも動けない」あなたへ",body:`<p>「動こうとすると止まる」——これ、意志の問題じゃないです。</p><p>止まるのは、<strong>最初の一歩が大きすぎるから</strong>です。</p><p>大げさに始めなくていい。夜に30分だけ、AIに「今日あったこと」を話しかけるだけで、動き始められます。</p>`,steps:["今夜、AIにこの1問だけ渡してみてください：","「今日あった出来事を1つ話してください。その体験から何を感じましたか？」","答えるだけ。それだけで最初の一歩になります。"],present:"壁打ち体験1問プロンプト",note:""},
c:{type:"TYPE 3",name:"成果が出ない",keyword:"届かない",title:"「動いてるのに結果が出ない」あなたへ",body:`<p>動いてるのに成果が出ない。これが一番しんどいです。</p><p>でも原因はほぼ決まっています。<strong>届く前に離脱されている</strong>んです。</p><p>やってること自体は間違ってない。届け方を直すだけで変わります。</p>`,steps:["プロフィール・投稿・導線を15項目でチェックする","×が付いた項目を1つずつ直す（1日1個でいい）","届け方が整ったら、同じことをしても結果が変わる"],present:"導線チェックリスト15項目",note:""},
d:{type:"TYPE 4",name:"消耗してる",keyword:"仕組み",title:"「成果は出てる。でも消耗してる」あなたへ",body:`<p>ここまで来たのに、毎晩消耗している。それはもったいないです。</p><p>成果が出ているということは、やり方は合ってる。問題は<strong>「自分がいないと止まる状態」</strong>になっていることです。</p><p>最終形は「確認するだけ」の状態です。</p>`,steps:["「今どのフェーズにいるか」を全体マップで確認する","抜けているフェーズを1つ特定する","そのフェーズだけを今週埋める"],present:"全体マップ（フェーズ1〜5）",note:""}
};

let current = 0;
let answers = {a:0,b:0,c:0,d:0};
let history = [];

function startQuiz(){
document.getElementById('intro').style.display='none';
document.getElementById('quiz').style.display='block';
renderQuestion();
}

function renderQuestion(){
const quiz = document.getElementById('quiz');
const existing = quiz.querySelector('.question-card');
if(existing) existing.remove();
const q = questions[current];
const card = document.createElement('div');
card.className = 'question-card active';
card.innerHTML = `
<p class="q-number">Q${current+1} / 10</p>
<p class="q-text">${q.q}</p>
<button class="option" onclick="answer('a')">${q.a}</button>
<button class="option" onclick="answer('b')">${q.b}</button>
<button class="option" onclick="answer('c')">${q.c}</button>
<button class="option" onclick="answer('d')">${q.d}</button>
${current > 0 ? '<button class="back-btn" onclick="goBack()">← 前の質問に戻る</button>' : ''}
`;
quiz.appendChild(card);
document.getElementById('progressText').textContent = `QUESTION ${current+1} / 10`;
document.getElementById('progressBar').style.width = ((current+1)/10*100)+'%';
window.scrollTo({top:0,behavior:'smooth'});
}

function answer(choice){
history.push(choice);
answers[choice]++;
current++;
if(current < 10){renderQuestion();}
else{showResult();}
}

function goBack(){
if(current > 0){
current--;
const prev = history.pop();
answers[prev]--;
renderQuestion();
}
}

function showResult(){
document.getElementById('quiz').style.display='none';
document.getElementById('progressBar').style.width='100%';
let maxKey = 'a';
for(let k in answers){if(answers[k] > answers[maxKey]) maxKey = k;}
const r = results[maxKey];
const stepsHtml = r.steps.map(s => `<li>${s}</li>`).join('');
const noteHtml = r.note ? `<p class="result-note">${r.note}</p>` : '';
document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML = `
<div class="result-card">
<p class="result-type">${r.type}　${r.name}</p>
<h2 class="result-title">${r.title}</h2>
<div class="result-body">
${r.body}
<div class="result-steps">
<p>今のあなたがやるべきこと</p>
<ol>${stepsHtml}</ol>
</div>
${noteHtml}
</div>
</div>
<div class="cta-box">
<div class="cta-profile"><img src="icon.jpeg" alt="けーじー"><span>けーじー</span></div>
<p>「${r.present}」を<br>LINEで受け取る</p>
<a href="https://lin.ee/N9yY54n" class="cta-btn">無料で受け取る</a>
</div>
<p class="cta-note">登録後「<strong>${r.keyword}</strong>」と送ってください</p>
`;
window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
