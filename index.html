<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜1時間、どこで詰まっていますか？ 4タイプ診断</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f7;color:#2c2c2a;line-height:1.8}
.container{max-width:640px;margin:0 auto;padding:20px 16px 80px}
h1{font-size:22px;font-weight:500;text-align:center;margin:40px 0 12px;line-height:1.5}
.subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:40px}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:#1d9e75;transition:width .3s ease;z-index:100}
.progress-text{text-align:center;font-size:13px;color:#888;margin-bottom:24px}

/* Quiz */
.question-card{background:#fff;border-radius:12px;padding:24px 20px;margin-bottom:16px;display:none}
.question-card.active{display:block}
.q-number{font-size:13px;color:#1d9e75;font-weight:500;margin-bottom:8px}
.q-text{font-size:16px;font-weight:500;margin-bottom:20px;line-height:1.6}
.option{display:block;width:100%;text-align:left;background:#faf9f7;border:1.5px solid #e8e6e1;border-radius:10px;padding:14px 16px;margin-bottom:10px;font-size:14px;line-height:1.6;cursor:pointer;transition:all .2s}
.option:hover{border-color:#1d9e75;background:#e1f5ee}
.option.selected{border-color:#1d9e75;background:#e1f5ee;font-weight:500}

/* Result */
#result{display:none}
.result-card{background:#fff;border-radius:12px;padding:32px 24px;margin-bottom:24px}
.result-type{font-size:13px;color:#1d9e75;font-weight:500;margin-bottom:4px}
.result-title{font-size:20px;font-weight:500;margin-bottom:20px;line-height:1.5}
.result-body{font-size:15px;line-height:1.9}
.result-body p{margin-bottom:16px}
.result-steps{background:#faf9f7;border-radius:10px;padding:20px;margin:20px 0}
.result-steps li{margin-bottom:8px;font-size:14px;line-height:1.7}
.cta-box{background:#1d9e75;border-radius:12px;padding:28px 24px;text-align:center;margin-top:32px}
.cta-box p{color:#fff;font-size:15px;margin-bottom:16px;line-height:1.7}
.cta-btn{display:inline-block;background:#fff;color:#1d9e75;font-size:16px;font-weight:500;padding:14px 40px;border-radius:50px;text-decoration:none;transition:transform .2s}
.cta-btn:hover{transform:scale(1.03)}
.cta-note{text-align:center;color:#888;font-size:12px;margin-top:16px}

/* Intro */
#intro .intro-lead{font-size:15px;line-height:1.9;margin-bottom:24px}
#intro .intro-lead p{margin-bottom:12px}
.start-btn{display:block;width:100%;background:#1d9e75;color:#fff;font-size:16px;font-weight:500;padding:16px;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.02)}
.profile{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.profile img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.profile-name{font-size:13px;color:#888}
.cta-profile{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.cta-profile img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.type-list{margin:20px 0 32px}
.type-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #eee;font-size:14px}
.type-item:last-child{border-bottom:none}
.type-badge{flex-shrink:0;background:#e1f5ee;color:#1d9e75;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:2px}
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="container">

<!-- INTRO -->
<div id="intro">
<div class="profile"><img src="icon.jpeg" alt="けーじー"><span class="profile-name">けーじー｜夜1時間の届け方</span></div>
<h1>夜1時間、<br>どこで詰まっていますか？</h1>
<p class="subtitle">20問でわかる 4タイプ診断</p>
<div class="intro-lead">
<p>本業・育児・家事に追われて、使えるのは夜1時間だけ。</p>
<p>「何かを始めたい。でも何から始めればいいか分からない。」</p>
<p>その詰まりの原因は、4タイプに分かれます。</p>
</div>
<div class="type-list">
<div class="type-item"><span class="type-badge">タイプ1</span>ジャンル迷子 — 何を発信すればいいか決まっていない</div>
<div class="type-item"><span class="type-badge">タイプ2</span>書けない壁 — テーマはあるが書けない・続かない</div>
<div class="type-item"><span class="type-badge">タイプ3</span>届かない迷路 — 書けているが読まれない・売れない</div>
<div class="type-item"><span class="type-badge">タイプ4</span>仕組み化不足 — 売れているが消耗している</div>
</div>
<p style="font-size:14px;color:#888;margin-bottom:20px;text-align:center">所要時間：約3分</p>
<button class="start-btn" onclick="startQuiz()">診断をはじめる</button>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none">
<p class="progress-text" id="progressText"></p>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>
const questions = [
{q:"今、定期的に発信できていますか？",a:"何を発信すればいいかわからず、投稿がほぼゼロ",b:"投稿しようとするたびに手が止まって、結局書けていない",c:"週数回は投稿できているが、反応がほぼない",d:"投稿も売上も出ているが、作業量が多くて疲れている"},
{q:"プロフィールを他人に見せたとき、どう感じますか？",a:"テーマが決まっていないので書けない",b:"何度も書き直して結局中途半端のまま",c:"書いたが、フォロワーが増えない",d:"整っているが、毎回手動で微調整していて手間"},
{q:"直近1ヶ月でnoteを公開した本数は？",a:"0本。テーマが決まらない",b:"書きかけが3本以上あるが完成していない",c:"3本以上公開できているが売上ほぼゼロ",d:"売れている記事はあるが次の商品設計に手が回らない"},
{q:"発信テーマについて、今どんな状態ですか？",a:"複数の候補があって絞れない",b:"決めても、いざ書くと手が止まる",c:"テーマは決まっていて書けるが刺さらない",d:"テーマは確立しているが時間がかかりすぎる"},
{q:"「夜1時間の作業」で実際にやっていることは？",a:"何をすればいいかわからず調べるだけで終わる",b:"導入部分で詰まって1時間が過ぎる",c:"書けているが反応を確認してため息をついて終わる",d:"作業は進んでいるが毎晩同じ作業の繰り返し"},
{q:"AIを使ったことがありますか？",a:"何を聞けばいいかわからずやめた",b:"文章を書かせると自分らしくない",c:"文章生成には使えるが集客に活かせていない",d:"使いこなしているが自動化できていない"},
{q:"AIに「記事を書いて」と頼んだとき、どうなりましたか？",a:"テーマ自体が決まっていなくて質問できなかった",b:"書いてもらったが「自分の言葉じゃない」とボツにした",c:"記事は完成したが読まれなかった",d:"量産できるがクオリティのばらつきが気になる"},
{q:"AIへの指示（プロンプト）について今どんな状態？",a:"うまく使えた経験がない",b:"工夫しているが毎回出力がバラバラ",c:"安定してきたが導線設計には応用できていない",d:"テンプレートはあるが更新管理が手間"},
{q:"AIを「壁打ち相手」として使ったことは？",a:"やり方がわからない",b:"やってみたがAIの回答が的外れで諦めた",c:"壁打ちできているが記事に活かしきれていない",d:"日常的にできているが記録再利用の仕組みがない"},
{q:"AI活用で「うまくいった」と思えた経験は？",a:"まだない",b:"一度だけあったが再現できていない",c:"記事を書く場面では再現できるが売上には…",d:"再現性はあるが自分が毎回やらないといけない"},
{q:"夜1時間の使い方で、いちばん近い状態は？",a:"「何をすべきか」が決まらず終わる",b:"「書く」ことに使いたいが書けず終わる",c:"投稿や記事は書けるが結果につながらない",d:"作業はできるが毎晩作業しないと止まる"},
{q:"本業・育児・家事以外の時間は確保できていますか？",a:"平日はほぼゼロ",b:"夜1時間は確保できるが集中力が続かない",c:"夜1〜2時間使えるが優先順位がバラバラ",d:"時間はあるが作業が増えて足りなくなってきた"},
{q:"「今夜何をすればいいか」を決めるのにどのくらいかかる？",a:"毎晩30分以上。決められないまま終わることも",b:"やることは決まるが別の作業に迷い込む",c:"決めること自体は早いが正しい作業か不安",d:"ルーティンはあるがその見直しに時間を使えていない"},
{q:"「夜1時間」の理想の使い方として近いのは？",a:"まず「方向性を決める」ことに使いたい",b:"「書く」ことだけに集中できる状態にしたい",c:"「書く」から「届ける・売る」設計にシフトしたい",d:"「判断・承認するだけ」にして仕組みに任せたい"},
{q:"今、販売している商品・サービスはありますか？",a:"ない。何を売ればいいかもわからない",b:"作りかけのnoteはあるが完成していない",c:"公開しているがほぼ売れていない",d:"売れているがバリエーションや価格帯を見直したい"},
{q:"「自分の経験をコンテンツにする」イメージは？",a:"自分には売れるものがないと思っている",b:"何かあるはずだが言語化できていない",c:"言語化はできたが購入してもらえるか自信がない",d:"商品はあるが導線・ステップ設計がまだ粗い"},
{q:"「300円のnote」を今すぐ出すとしたら、いちばんの障壁は？",a:"テーマが決まらないので何も書けない",b:"どこから始めればいいかわからなくなる",c:"書いて出したが誰にも見つけてもらえなかった",d:"出せるが毎回ゼロから書いていて消耗している"},
{q:"「やめようかな」と思ったのはどんな瞬間？",a:"何をすればいいかわからなくてスタートできていない",b:"書こうとするたびに止まって「向いていないかも」",c:"投稿も書けているのにまったく反応がなかったとき",d:"作業量が多すぎて「これが続くのか」と感じたとき"},
{q:"3ヶ月後に変わるには、今何が足りない？",a:"発信テーマとポジションが決まっていない",b:"書き続ける仕組みと書き方のパターン",c:"書けているのに届かない理由がわかっていない",d:"仕組みを自動化して消耗しない設計"},
{q:"今、いちばん正直な気持ちは？",a:"「何から始めればいいか教えてほしい」",b:"「とにかく書けるようになりたい」",c:"「書けているのになぜ売れないのか知りたい」",d:"「もっとラクに成果を出す設計を知りたい」"}
];

const results = {
a:{type:"タイプ①",name:"ジャンル迷子",keyword:"テーマ",title:"「何を発信すればいいか決まっていない」あなたへ",body:`<p>これは「センスの問題」でも「あなたが特別じゃない問題」でもありません。</p><p>ジャンルが決まらない理由は、<strong>今の自分がどのステージにいるか見えていないから</strong>です。</p><p>テーマを探す前に「自分は今どこにいるのか」が分かっていないと、何を選んでも不安なまま進むことになります。</p>`,steps:["「発信ステージ診断シート」で今の自分のステージを確認する","自分のステージで「次にやること1つ」を特定する","それだけやる。テーマの決め方は、ステージが分かってから"],present:"発信ステージ診断シート",note:"コンセプトの決め方を詳しく知りたくなったら、300円noteに全部書いてあります。"},
b:{type:"タイプ②",name:"書けない壁",keyword:"書けない",title:"「テーマはある。でも書けない・続かない」あなたへ",body:`<p>「書こうとすると止まる」——これ、意志の問題じゃないです。</p><p>止まるのは、<strong>頭の中に素材がないまま書こうとしているから</strong>です。</p><p>書き始める前にまずAIと話す。命令するんじゃなくて、話しかける。「今日こういうことがあって」——それだけで下書きの入口ができます。</p>`,steps:["今夜、AIにこの1問だけ渡してみてください：","「今日あった出来事を1つ話してください。その体験から何を感じましたか？」","AIが聞いてきます。答えるだけ。それだけで下書きの素材が出てきます。"],present:"壁打ち体験1問プロンプト",note:"全5パターンのプロンプトと25分で完成する全プロセスは3,980円noteに書いてあります。まずはこの1問から。"},
c:{type:"タイプ③",name:"届かない迷路",keyword:"届かない",title:"「書けているのに読まれない・売れない」あなたへ",body:`<p>書けているのに売れない。これが一番しんどいです。</p><p>でも原因はほぼ決まっています。<strong>届く前に離脱されている</strong>んです。</p><p>プロフィール・フック・導線のどこかに穴があります。書けているなら、設計を直すだけで変わります。</p>`,steps:["プロフィール・投稿フック・note導線を15項目でチェックする","×が付いた項目を1つずつ直す（1日1個でいい）","導線が整ったら、今ある記事に新しい読者が来るようになる"],present:"Threads×note導線チェックリスト15項目",note:""},
d:{type:"タイプ④",name:"仕組み化不足",keyword:"仕組み",title:"「売れているのに消耗している」あなたへ",body:`<p>ここまで来たのに、毎晩消耗している。それはもったいないです。</p><p>売上があるということは需要がある。問題は<strong>「自分がいないと止まる設計」</strong>になっていることです。</p><p>夜1時間の最終形は「承認するだけ」の状態です。</p>`,steps:["「今どのPhaseにいるか」を全体マップで確認する","抜けているPhaseを1つ特定する","そのPhaseだけを今週埋める"],present:"夜1時間設計メソッド全体マップ",note:""}
};

let current = 0;
let answers = {a:0,b:0,c:0,d:0};

function startQuiz(){
document.getElementById('intro').style.display='none';
document.getElementById('quiz').style.display='block';
renderQuestion();
}

function renderQuestion(){
const quiz = document.getElementById('quiz');
const existing = quiz.querySelector('.question-card');
if(existing) existing.remove();

const q = questions[current];
const card = document.createElement('div');
card.className = 'question-card active';
card.innerHTML = `
<p class="q-number">Q${current+1} / 20</p>
<p class="q-text">${q.q}</p>
<button class="option" onclick="answer('a')">${q.a}</button>
<button class="option" onclick="answer('b')">${q.b}</button>
<button class="option" onclick="answer('c')">${q.c}</button>
<button class="option" onclick="answer('d')">${q.d}</button>
`;
quiz.appendChild(card);
document.getElementById('progressText').textContent = `${current+1} / 20`;
document.getElementById('progressBar').style.width = ((current+1)/20*100)+'%';
window.scrollTo({top:0,behavior:'smooth'});
}

function answer(choice){
answers[choice]++;
current++;
if(current < 20){
renderQuestion();
} else {
showResult();
}
}

function showResult(){
document.getElementById('quiz').style.display='none';
document.getElementById('progressBar').style.width='100%';

let maxKey = 'a';
for(let k in answers){
if(answers[k] > answers[maxKey]) maxKey = k;
}
// Tie-break: use Q20 answer (last answer)
const r = results[maxKey];

const stepsHtml = r.steps.map(s => `<li>${s}</li>`).join('');
const noteHtml = r.note ? `<p style="margin-top:16px;font-size:14px;color:#888">${r.note}</p>` : '';

document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML = `
<div class="result-card">
<p class="result-type">${r.type}　${r.name}</p>
<h2 class="result-title">${r.title}</h2>
<div class="result-body">
${r.body}
<div class="result-steps">
<p style="font-weight:500;margin-bottom:12px;font-size:14px">今のあなたがやるべきこと：</p>
<ol>${stepsHtml}</ol>
</div>
${noteHtml}
</div>
</div>
<div class="cta-box">
<div class="cta-profile"><img src="icon.jpeg" alt="けーじー"><span style="color:#fff;font-size:13px">けーじー</span></div>
<p>「${r.present}」を<br>LINEで受け取る</p>
<a href="https://lin.ee/N9yY54n" class="cta-btn">LINEで受け取る</a>
</div>
<p class="cta-note">登録後「<strong>${r.keyword}</strong>」と送ってください</p>
`;
window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
